<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truth File</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #333;
        }
        .navbar {
            background: #1565c0;
            padding: 15px 30px;
            display: flex;
            gap: 20px;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .container {
            padding: 30px;
        }
        .download-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 16px;
            background: #1565c0;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        .table-wrap {
            background: white;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }
        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 1400px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            white-space: nowrap;
        }
        th {
            background: #1565c0;
            color: white;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/dashboard">Dashboard</a>
        <a href="/patient-claims">Patient Claim Information</a>
        <a href="/truth-file">Truth File</a>
        <a href="/download">Download Truth File</a>
    </div>

    <div class="container">
        <h1>Truth File</h1>
        <a class="download-btn" href="/download">Download Truth File</a>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        {% for col in columns %}
                            <th>{{ col }}</th>
                        {% endfor %}
                    </tr>
                </thead>
                <tbody>
                    {% for row in records %}
                        <tr>
                            {% for col in columns %}
                                <td>{{ row[col] }}</td>
                            {% endfor %}
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
